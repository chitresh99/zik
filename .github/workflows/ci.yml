name: zik-ci

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout code
              uses: actions/checkout@v6

            - name: setup go
              uses: actions/setup-go@v6
              with:
                go-version: '1.25'
            
            - name: Download dependencies
              run: go mod download
       

